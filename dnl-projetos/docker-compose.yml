version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dnl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:?defina KC_DB_PASSWORD forte no .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dnl_net

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: dnl_keycloak
    restart: unless-stopped
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:?defina KC_DB_PASSWORD forte no .env}
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HTTP_ENABLED: 'true'
      KC_PROXY: edge
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:?defina KC_ADMIN_PASSWORD forte no .env}
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    networks:
      - dnl_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    container_name: dnl_api
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3001
      DB_PATH: /data/dnl-projetos.db
    volumes:
      - sqlite_data:/data
    # API NÃO exposta publicamente — só acessível na rede interna (via Nginx) e em 127.0.0.1 do host.
    # Evita furar o proxy reverso e bloqueia spoofing de X-Forwarded-For vindo da internet.
    ports:
      - '127.0.0.1:3001:3001'
    depends_on:
      - keycloak
    networks:
      - dnl_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: dnl_frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - api
    networks:
      - dnl_net

volumes:
  postgres_data:
  sqlite_data:

networks:
  dnl_net:
    driver: bridge
