# Esconde a versão do Nginx nos headers de resposta (MED-01 / fingerprinting).
server_tokens off;

# ── HTTP (porta 80) ────────────────────────────────────────────────────────────
# Redireciona todo o tráfego para HTTPS. O Certbot mantém o desafio ACME acessível
# via /.well-known/acme-challenge/ para renovação automática do certificado.
server {
    listen 80;
    server_name dnlusucapiao.com.br www.dnlusucapiao.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (porta 443) ───────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name dnlusucapiao.com.br www.dnlusucapiao.com.br;

    # Certificados gerados pelo Certbot (Let's Encrypt).
    ssl_certificate     /etc/letsencrypt/live/dnlusucapiao.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dnlusucapiao.com.br/privkey.pem;

    # Hardening TLS: só protocolos modernos.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS: força HTTPS no navegador por 1 ano (defesa contra downgrade).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
